name: grant-portfolio
display_name: "Research Grant Portfolio — Burn Rate and NCE Risk Analysis"
description: |
  Research office analyst pulls sponsored program expenditure records via
  clAWS (Glue/Athena), runs the grant-portfolio compute profile to compute
  per-award burn rates and flag awards approaching no-cost extension (NCE)
  territory, and delivers a PI-level summary for post-award review. Demonstrates
  the full clAWS → Compute pipeline for sponsored programs analytics.
category: institutional-analytics
requires:
  stacks: [claws, compute]
  setup: |
    Demo data pre-loaded: claws_demo.sponsored_program_expenditures in us-east-1 Glue catalog.
    Schema: award_id, pi_id, fiscal_month, expenditure_usd, total_budget_usd, award_end_date.

steps:
  - id: discover
    tool: claws-discover
    stack: claws
    description: "Find sponsored program expenditure table in Glue catalog"
    input:
      query: "sponsored program expenditure award"
      scope:
        domains: ["athena"]
    assert:
      - path: "sources"
        op: exists
      - path: "sources.0.id"
        op: exists

  - id: probe
    tool: claws-probe
    stack: claws
    description: "Inspect schema of expenditure table"
    input:
      source_id: "{discover.sources.0.id}"
      mode: schema_only
    assert:
      - path: "schema"
        op: exists

  - id: plan
    tool: claws-plan
    stack: claws
    description: "Plan query to extract all expenditure records for burn rate analysis"
    input:
      source_id: "{discover.sources.0.id}"
      objective: |
        Extract all sponsored program transaction records:
        award_id, pi_id, fiscal_month, expenditure_usd, total_budget_usd, award_end_date.
        Include only records where expenditure_usd > 0.
      output_columns:
        - award_id
        - pi_id
        - fiscal_month
        - expenditure_usd
        - total_budget_usd
        - award_end_date
    assert:
      - path: "plan_id"
        op: exists
      - path: "status"
        op: in
        value: ["ready", "pending_approval"]

  - id: excavate
    tool: claws-excavate
    stack: claws
    description: "Execute expenditure query"
    input:
      plan_id: "{plan.plan_id}"
      source_id: "{discover.sources.0.id}"
      query: "{plan.steps.0.input.query}"
      query_type: "{plan.steps.0.input.query_type}"
    assert:
      - path: "result_uri"
        op: exists
      - path: "rows_returned"
        op: gte
        value: 1

  - id: refine
    tool: claws-refine
    stack: claws
    description: "Deduplicate expenditure records"
    input:
      run_id: "{excavate.run_id}"
      operations: ["dedupe"]
    assert:
      - path: "refined_uri"
        op: exists

  - id: export_for_compute
    tool: claws-export
    stack: claws
    description: "Stage refined expenditure data to S3 for grant-portfolio compute"
    input:
      run_id: "{refine.run_id}"
      destination:
        type: s3
        uri: "s3://claws-runs-942542972736/demo-exports/grant-portfolio/"
      include_provenance: true
    assert:
      - path: "destination_uri"
        op: exists
      - path: "provenance_uri"
        op: exists

  - id: run
    tool: compute_run
    stack: compute
    description: "Run grant-portfolio burn rate and NCE risk analysis"
    input:
      profile_id: "grant-portfolio"
      source_uri: "{export_for_compute.destination_uri}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        amount_column: expenditure_usd
        budget_column: total_budget_usd
        date_column: fiscal_month
        award_id_column: award_id
        pi_column: pi_id
        nce_threshold: 0.90
      result_label: "grant-portfolio-nce-risk"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for grant-portfolio analysis to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
