name: enrollment-forecast
display_name: "Enrollment Headcount Forecast (IPEDS)"
description: |
  IR office searches for IPEDS enrollment trend data on the Registry of Open
  Data on AWS, then runs a Prophet time-series model to project headcount 8
  semesters forward. The compute layer reads institutional enrollment data
  directly from the public NCES S3 dataset, bypassing the Quick Sight loading
  step. A narrative summary is routed through the model router for a
  provost-ready budget briefing paragraph.
category: institutional-analytics
requires:
  stacks: [data, compute, router]
  setup: |
    No setup required — uses public IPEDS data from RODA.

steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Find IPEDS enrollment headcount dataset on RODA"
    input:
      query: "IPEDS Integrated Postsecondary Education Data System enrollment headcount"
      max_results: 5
      exclude_deprecated: true
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run Prophet forecast — 8-semester headcount projection"
    input:
      profile_id: "forecast-prophet"
      source_uri: "s3://nces-ipeds-data/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        date_column: year
        value_column: total_enrollment
        forecast_horizon: 8
        seasonality_mode: multiplicative
      result_label: "enrollment-forecast-8sem"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]

  - id: narrative
    tool: generate
    stack: router
    description: "Draft provost-facing headcount forecast summary"
    input:
      prompt: |
        Draft a 2-paragraph headcount forecast summary for the provost's budget
        presentation, highlighting trend and 95% confidence interval. Use the
        following forecast data:
        {status.result_summary}
      max_tokens: 512
      temperature: 0.4
    assert:
      - path: "content"
        op: exists
