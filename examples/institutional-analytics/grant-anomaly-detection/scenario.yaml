name: grant-anomaly-detection
display_name: "Sponsored Program Expenditure Anomaly Detection"
description: |
  Research office compliance team discovers sponsored program expenditure
  records via clAWS (Glue/Athena), runs an Isolation Forest anomaly detection
  model to flag unusual burn rate patterns that may indicate award misuse or
  financial risk, and exports flagged grants with anomaly scores for PI and
  compliance officer review.
category: institutional-analytics
requires:
  stacks: [claws, compute]
  setup: |
    Demo data pre-loaded: claws_demo.sponsored_program_expenditures in us-east-1 Glue catalog.
    Schema: award_id, pi_id, fiscal_month, expenditure_usd, total_budget_usd, award_end_date.

steps:
  - id: discover
    tool: claws-discover
    stack: claws
    description: "Find sponsored program expenditure table in Glue catalog"
    input:
      query: "sponsored program expenditure award"
      scope:
        domains: ["athena"]
    assert:
      - path: "sources"
        op: exists
      - path: "sources.0.id"
        op: exists

  - id: probe
    tool: claws-probe
    stack: claws
    description: "Inspect schema of sponsored program expenditure table"
    input:
      source_id: "{discover.sources.0.id}"
      mode: schema_only
    assert:
      - path: "schema"
        op: exists

  - id: plan
    tool: claws-plan
    stack: claws
    description: "Plan query to extract monthly expenditure features for anomaly detection"
    input:
      source_id: "{discover.sources.0.id}"
      objective: |
        Extract monthly expenditure records per award: award_id, pi_id,
        fiscal_month, expenditure_usd, total_budget_usd, award_end_date.
        Include only records with expenditure_usd greater than zero.
      output_columns:
        - award_id
        - pi_id
        - fiscal_month
        - expenditure_usd
        - total_budget_usd
        - award_end_date
    assert:
      - path: "plan_id"
        op: exists
      - path: "status"
        op: in
        value: ["ready", "pending_approval"]

  - id: excavate
    tool: claws-excavate
    stack: claws
    description: "Execute the sponsored expenditure query"
    input:
      plan_id: "{plan.plan_id}"
      source_id: "{discover.sources.0.id}"
      query: "{plan.steps.0.input.query}"
      query_type: "{plan.steps.0.input.query_type}"
    assert:
      - path: "result_uri"
        op: exists
      - path: "rows_returned"
        op: gte
        value: 1

  - id: refine
    tool: claws-refine
    stack: claws
    description: "Deduplicate expenditure records before anomaly scoring"
    input:
      run_id: "{excavate.run_id}"
      operations: ["dedupe"]
    assert:
      - path: "refined_uri"
        op: exists

  - id: export_for_compute
    tool: claws-export
    stack: claws
    description: "Stage refined expenditure data to S3 for anomaly detection compute"
    input:
      run_id: "{refine.run_id}"
      destination:
        type: s3
        uri: "s3://claws-runs-942542972736/demo-exports/grant-anomaly-detection/"
      include_provenance: true
    assert:
      - path: "destination_uri"
        op: exists
      - path: "provenance_uri"
        op: exists

  - id: run
    tool: compute_run
    stack: compute
    description: "Run Isolation Forest anomaly detection on expenditure patterns"
    input:
      profile_id: "anomaly-isolation-forest"
      source_uri: "{export_for_compute.destination_uri}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        features:
          - expenditure_usd
          - total_budget_usd
        contamination: 0.03
        return_scores: true
        id_column: award_id
      result_label: "grant-anomalies-isolation-forest"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
