name: student-retention
display_name: "First-to-Second Year Retention by Cohort and Pell Status"
description: |
  Retention analyst discovers student retention cohort data via clAWS
  (Glue/Athena), excavates first-to-second year retention records by cohort
  and Pell grant status, runs a cohort retention analysis in
  campus-compute, and exports results to S3 for accreditation reporting.
category: institutional-analytics
requires:
  stacks: [claws, compute]
  setup: |
    Demo data pre-loaded: claws_demo.student_retention_cohorts in us-east-1 Glue catalog.
    Schema: student_id, entry_term, re_enrolled_date, pell_recipient, degree_program.

steps:
  - id: discover
    tool: claws-discover
    stack: claws
    description: "Find student retention cohort table in Glue catalog"
    input:
      query: "retention enrollment student cohort"
      scope:
        domains: ["athena"]
    assert:
      - path: "sources"
        op: exists
      - path: "sources.0.id"
        op: exists

  - id: probe
    tool: claws-probe
    stack: claws
    description: "Inspect schema and sample rows from the retention table"
    input:
      source_id: "{discover.sources.0.id}"
      mode: schema_only
    assert:
      - path: "schema"
        op: exists

  - id: plan
    tool: claws-plan
    stack: claws
    description: "Plan query to extract first-to-second year retention by cohort and Pell status"
    input:
      source_id: "{discover.sources.0.id}"
      objective: "Select first-to-second year retention records by entry cohort and Pell grant status"
      output_columns:
        - student_id
        - entry_term
        - re_enrolled_date
        - pell_recipient
        - degree_program
    assert:
      - path: "plan_id"
        op: exists
      - path: "status"
        op: in
        value: ["ready", "pending_approval"]

  - id: excavate
    tool: claws-excavate
    stack: claws
    description: "Execute the retention query plan"
    input:
      plan_id: "{plan.plan_id}"
      source_id: "{discover.sources.0.id}"
      query: "{plan.steps.0.input.query}"
      query_type: "{plan.steps.0.input.query_type}"
    assert:
      - path: "result_uri"
        op: exists
      - path: "rows_returned"
        op: gte
        value: 1

  - id: refine
    tool: claws-refine
    stack: claws
    description: "Deduplicate retention records before compute"
    input:
      run_id: "{excavate.run_id}"
      operations: ["dedupe"]
    assert:
      - path: "refined_uri"
        op: exists

  - id: export_raw
    tool: claws-export
    stack: claws
    description: "Export refined retention data to S3 for accreditation records"
    input:
      run_id: "{refine.run_id}"
      destination:
        type: s3
        uri: "s3://claws-runs-942542972736/demo-exports/student-retention/"
      include_provenance: true
    assert:
      - path: "destination_uri"
        op: exists
      - path: "provenance_uri"
        op: exists

  - id: run
    tool: compute_run
    stack: compute
    description: "Run retention-cohort analysis on excavated data"
    input:
      profile_id: "retention-cohort"
      source_uri: "{export_raw.destination_uri}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        student_id_column: student_id
        cohort_column: entry_term
        event_date_column: re_enrolled_date
        period_grain: semester
        group_by: ["pell_recipient", "degree_program"]
      result_label: "retention-cohort-pell"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
