name: peer-benchmarking
display_name: "Peer Benchmarking — Tuition Revenue per FTE (IPEDS)"
description: |
  IR director searches for IPEDS finance and enrollment data on the Registry
  of Open Data on AWS, runs a linear regression to benchmark tuition revenue
  per FTE against a national peer group, and routes results to the model
  router for board-ready talking points comparing the institution's position
  in the peer distribution. The compute layer reads IPEDS finance data
  directly from the public NCES S3 dataset, bypassing the Quick Sight
  loading step.
category: institutional-analytics
requires:
  stacks: [data, compute, router]
  setup: |
    No setup required — uses public IPEDS data from RODA.

steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Find IPEDS finance and revenue dataset on RODA"
    input:
      query: "IPEDS finance revenue expenditure per-FTE tuition enrollment selectivity"
      max_results: 5
      exclude_deprecated: true
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run linear regression benchmarking tuition revenue per FTE against peer features"
    input:
      profile_id: "regression-glm"
      source_uri: "s3://nces-ipeds-data/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        model_type: linear
        target_column: tuition_revenue_per_fte
        features:
          - total_enrollment
          - selectivity_rate
          - endowment_per_fte
          - pct_pell
        include_interactions: false
        output_residuals: true
      result_label: "peer-benchmark-tuition-fte"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]

  - id: talking_points
    tool: analyze
    stack: router
    description: "Draft board presentation talking points from peer benchmark results"
    input:
      prompt: |
        Identify where our institution falls in the peer distribution for tuition
        revenue per FTE and draft 3 bullet points for a board presentation. Use
        the following regression results and residual analysis:
        {status.result_summary}
      max_tokens: 400
      temperature: 0.3
    assert:
      - path: "content"
        op: exists
