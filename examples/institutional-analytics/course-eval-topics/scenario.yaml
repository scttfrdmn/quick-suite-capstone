name: course-eval-topics
display_name: "Course Evaluation Theme Discovery (LDA Topic Modeling)"
description: |
  Academic affairs office discovers course evaluation open-ended responses via
  clAWS (Glue/Athena), excavates responses for the current academic year, runs
  LDA topic modeling to identify recurring themes across departments, and
  exports the top topics per department for review by the faculty senate
  curriculum committee.
category: institutional-analytics
requires:
  stacks: [claws, compute]
  setup: |
    Demo data pre-loaded: claws_demo.course_evaluations in us-east-1 Glue catalog.
    Schema: response_id, course_id, department, response_text, term.

steps:
  - id: discover
    tool: claws-discover
    stack: claws
    description: "Find course evaluation response table in Glue catalog"
    input:
      query: "course evaluation response survey"
      scope:
        domains: ["athena"]
    assert:
      - path: "sources"
        op: exists
      - path: "sources.0.id"
        op: exists

  - id: probe
    tool: claws-probe
    stack: claws
    description: "Inspect schema of course evaluation table and cache for plan"
    input:
      source_id: "{discover.sources.0.id}"
      mode: schema_only
    assert:
      - path: "schema"
        op: exists

  - id: plan
    tool: claws-plan
    stack: claws
    description: "Plan query to select current-year open-ended responses with course and department"
    input:
      source_id: "{discover.sources.0.id}"
      objective: |
        Select all course evaluation open-ended responses from term 2024-Fall
        including course_id, department, and response_text. Exclude empty responses.
      output_columns:
        - response_id
        - course_id
        - department
        - response_text
        - term
    assert:
      - path: "plan_id"
        op: exists
      - path: "status"
        op: in
        value: ["ready", "pending_approval"]

  - id: excavate
    tool: claws-excavate
    stack: claws
    description: "Execute the course evaluation response query"
    input:
      plan_id: "{plan.plan_id}"
      source_id: "{discover.sources.0.id}"
      query: "{plan.steps.0.input.query}"
      query_type: "{plan.steps.0.input.query_type}"
    assert:
      - path: "result_uri"
        op: exists
      - path: "rows_returned"
        op: gte
        value: 1

  - id: refine
    tool: claws-refine
    stack: claws
    description: "Deduplicate and rank responses before topic modeling"
    input:
      run_id: "{excavate.run_id}"
      operations: ["dedupe", "rank"]
    assert:
      - path: "refined_uri"
        op: exists

  - id: export_for_compute
    tool: claws-export
    stack: claws
    description: "Stage refined responses to S3 for compute input"
    input:
      run_id: "{refine.run_id}"
      destination:
        type: s3
        uri: "s3://claws-runs-942542972736/demo-exports/course-eval-topics/"
      include_provenance: true
    assert:
      - path: "destination_uri"
        op: exists

  - id: run
    tool: compute_run
    stack: compute
    description: "Run LDA topic modeling across course evaluation responses"
    input:
      profile_id: "text-topics"
      source_uri: "{export_for_compute.destination_uri}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        text_column: response_text
        num_topics: 12
        method: lda
        min_doc_frequency: 0.02
        max_doc_frequency: 0.85
        group_by: department
        id_column: response_id
      result_label: "course-eval-topics-2024"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    poll:
      interval_seconds: 20
      max_attempts: 30
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
