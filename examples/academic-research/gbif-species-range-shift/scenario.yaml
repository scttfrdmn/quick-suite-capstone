name: gbif-species-range-shift
display_name: "GBIF Species Range Shift Detection"
description: |
  An ecologist loads GBIF species occurrence data from RODA, enriches
  observation records with Census American Community Survey geographic
  variables (population density, median household income) to characterize
  the landscape context of each occurrence, then runs a Spearman correlation
  analysis to detect whether observed latitude is shifting northward over
  time — a key signal of climate-driven range shifts. Two compute steps run
  in sequence: geo-enrich first, then explore-correlations on the enriched
  output.
category: academic-research
requires:
  stacks: [data, compute]
  setup: "No setup required — uses public RODA data."
steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Search RODA catalog for GBIF species occurrence data"
    input:
      query: "GBIF species occurrence biodiversity"
      tags: ["biodiversity", "species", "gbif", "ecology"]
      exclude_deprecated: true
      max_results: 5
    assert:
      - path: "datasets"
        op: exists
      - path: "datasets.0.slug"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: load
    tool: roda_load
    stack: data
    description: "Load GBIF occurrence dataset into Quick Sight"
    # soft skip: if search returned count=0, roda_load will return {"error": "..."} — assert only exists
    input:
      slug: "{search.datasets.0.slug}"
    assert:
      - path: "datasetId"
        op: exists
        skip_if_fail: true  # non-QS format or access error → skip
      - path: "claws_source_id"
        op: exists
        skip_if_fail: true

  - id: enrich
    tool: compute_run
    stack: compute
    description: "Geo-enrich occurrence records with ACS census variables"
    input:
      profile_id: "geo-enrich"
      source_uri: "claws://{load.claws_source_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        lat_column: "decimalLatitude"
        lon_column: "decimalLongitude"
        enrichment_source: "ACS_5year"
        variables:
          - "median_household_income"
          - "population_density"
      result_label: "gbif-acs-enriched"
      department: "ecology"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists
      - path: "estimated_duration_seconds"
        op: exists

  - id: enrich_status
    tool: compute_status
    stack: compute
    description: "Wait for geo-enrichment job to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{enrich.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]

  - id: correlate
    tool: compute_run
    stack: compute
    description: "Run Spearman correlations to detect northward range shift over time"
    input:
      profile_id: "explore-correlations"
      # result_uri is only present on SUCCEEDED; if enrich_status failed this step will surface the gap
      source_uri: "{enrich_status.result_uri}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        features:
          - "decimalLatitude"
          - "year"
          - "elevation"
        method: "spearman"
        top_n: 5
      result_label: "gbif-range-shift-correlations"
      department: "ecology"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for correlation analysis to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{correlate.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
