name: gbif-species-range-shift
display_name: "GBIF Species Range Shift Detection"
description: |
  An ecologist searches for GBIF species occurrence data on the Registry of
  Open Data on AWS, then runs a Spearman correlation analysis directly against
  the public GBIF Parquet snapshot to detect whether observed latitude is
  shifting northward over time — a key signal of climate-driven range shifts.
  The compute layer reads the GBIF occurrence Parquet files directly from S3,
  bypassing the Quick Sight loading step. The workflow demonstrates how
  researchers can go from open data discovery to statistical analysis output
  without leaving the Quick Suite environment.
category: academic-research
requires:
  stacks: [data, compute]
  setup: "No setup required — uses public RODA data."
steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Search RODA catalog for GBIF species occurrence data"
    input:
      query: "GBIF species occurrence biodiversity"
      tags: ["biodiversity", "species", "gbif", "ecology"]
      exclude_deprecated: true
      max_results: 5
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run Spearman correlations to detect northward range shift over time"
    input:
      profile_id: "explore-correlations"
      source_uri: "s3://gbif-open-data-us-east-1/occurrence/2026-04-01/occurrence.parquet/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        features:
          - "decimalLatitude"
          - "year"
          - "elevation"
        method: "spearman"
        top_n: 5
      result_label: "gbif-range-shift-correlations"
      department: "ecology"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists
      - path: "estimated_duration_seconds"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for correlation analysis to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
