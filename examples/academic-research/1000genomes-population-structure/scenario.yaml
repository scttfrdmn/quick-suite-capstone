name: 1000genomes-population-structure
display_name: "1000 Genomes Population Structure Clustering"
description: |
  A bioinformatics researcher searches for 1000 Genomes Project data on the
  Registry of Open Data on AWS, then runs k-means clustering on DRAGEN v4.4.7
  re-analysis sample metadata to identify global population structure. The
  workflow reads the 1000 Genomes DRAGEN dataset directly from S3, clustering
  samples by genetic ancestry proxies (superpopulation group, sex) to recover
  the five major super-population groups (AFR, AMR, EAS, EUR, SAS). Raw VCF
  processing is assumed to have been completed upstream; this scenario
  demonstrates the discovery-to-cluster pipeline within Quick Suite without
  the Quick Sight loading step.
category: academic-research
requires:
  stacks: [data, compute]
  setup: "No setup required — uses public RODA data."
steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Search RODA catalog for 1000 Genomes Project data"
    input:
      query: "1000 Genomes Project human genome sequencing population"
      tags: ["genomics", "human", "population-genetics"]
      exclude_deprecated: true
      max_results: 5
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run k-means clustering on sample metadata (k=5 super-populations)"
    input:
      profile_id: "clustering-kmeans"
      source_uri: "s3://1000genomes-dragen-v4-4-7/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        k: 5
        features:
          - "superpopulation"
          - "sex"
          - "coverage"
        standardize: true
      result_label: "1000genomes-k5-superpopulations"
      department: "bioinformatics"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists
      - path: "estimated_duration_seconds"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for k-means clustering job to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
