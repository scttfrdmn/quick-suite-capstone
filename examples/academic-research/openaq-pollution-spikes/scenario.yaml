name: openaq-pollution-spikes
display_name: "OpenAQ Air Quality Anomaly Detection"
description: |
  An environmental scientist searches for OpenAQ air quality monitoring data
  on the Registry of Open Data on AWS, then runs an isolation forest anomaly
  detection model directly against the public OpenAQ S3 dataset to flag
  pollution spike events. The contamination parameter (5%) targets the rarest
  measurement extremes — episodes likely caused by wildfires, industrial
  accidents, or sensor faults. The compute layer reads OpenAQ CSV records
  directly from S3, bypassing the Quick Sight loading step. The returned
  anomaly scores enable downstream temporal pattern investigation.
category: academic-research
requires:
  stacks: [data, compute]
  setup: "No setup required — uses public RODA data."
steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Search RODA catalog for OpenAQ air quality monitoring data"
    input:
      query: "OpenAQ air quality monitoring measurements"
      tags: ["air-quality", "environment", "openaq", "pollution"]
      exclude_deprecated: true
      max_results: 5
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run isolation forest to flag pollution spike anomalies (contamination=5%)"
    input:
      profile_id: "anomaly-isolation-forest"
      source_uri: "s3://openaq-fetches/records/csv/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        features:
          - "value"
        contamination: 0.05
        return_scores: true
      result_label: "openaq-pollution-spikes"
      department: "environmental-science"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists
      - path: "estimated_duration_seconds"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for anomaly detection job to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]
