name: cdc-health-disparities
display_name: "CDC PLACES Health Disparities Regression"
description: |
  A public health researcher searches for CDC PLACES local health measures
  on the Registry of Open Data on AWS, runs a logistic regression modeling
  social determinants of diabetes prevalence directly against the public CDC
  S3 dataset, and then uses the campus-router analyze tool to draft a
  grant significance section summarizing the key drivers of variation. The
  compute layer reads CDC BRFSS prevalence data directly from S3, bypassing
  the Quick Sight loading step. The workflow illustrates how all three stacks
  (data, compute, router) compose through AgentCore Gateway without any
  local infrastructure.
category: academic-research
requires:
  stacks: [data, compute, router]
  setup: "No setup required — uses public RODA data."
steps:
  - id: search
    tool: roda_search
    stack: data
    description: "Search RODA catalog for CDC PLACES local health measures"
    input:
      query: "CDC PLACES local health measures census tract"
      tags: ["health", "cdc", "chronic-disease", "census"]
      exclude_deprecated: true
      max_results: 5
    assert:
      - path: "datasets"
        op: exists
      - path: "count"
        op: gte
        value: 1
        skip_if_fail: true  # catalog gap → skip, not fail

  - id: run
    tool: compute_run
    stack: compute
    description: "Run logistic regression: social determinants predicting diabetes prevalence"
    input:
      profile_id: "regression-glm"
      source_uri: "s3://cdc-brfss-annual-prevalence-data/"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
      parameters:
        model_type: "logistic"
        target_column: "diabetes_prevalence"
        features:
          - "median_income"
          - "pct_no_insurance"
          - "pct_poverty"
          - "pct_obesity"
        include_interactions: false
      result_label: "cdc-places-diabetes-sdoh-regression"
      department: "public-health"
    assert:
      - path: "job_id"
        op: exists
      - path: "estimated_cost_usd"
        op: exists
      - path: "estimated_duration_seconds"
        op: exists

  - id: status
    tool: compute_status
    stack: compute
    description: "Wait for logistic regression job to complete"
    poll:
      interval_seconds: 15
      max_attempts: 24
    input:
      job_id: "{run.job_id}"
      user_arn: "arn:aws:iam::942542972736:user/e2e-test-user"
    assert:
      - path: "status"
        op: in
        value: [SUCCEEDED, FAILED]

  - id: narrative
    tool: analyze
    stack: router
    description: "Draft grant significance section summarizing social determinants findings"
    input:
      prompt: "Summarize the key social determinants driving diabetes prevalence variation, suitable for a grant significance section"
      context: "{status.job_id}"
      department: "public-health"
      max_tokens: 400
      temperature: 0.3
    assert:
      - path: "content"
        op: exists
